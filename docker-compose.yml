services:
  web:
    build: .
    image: queuestorm:latest
    container_name: queuestorm-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside the container we want SQLite to live on the volume.
      - DJANGO_SQLITE_PATH=/app/data/db.sqlite3
      # Local docker-compose is not Railway, so keep DEBUG on.
      - DEBUG=${DEBUG:-True}
    volumes:
      - queuestorm-data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      # Mirrors the Dockerfile HEALTHCHECK. Start period gives migrate time.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  queuestorm-data: